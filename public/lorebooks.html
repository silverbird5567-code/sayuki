<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sayuki - lorebooks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block&icons=account_circle,handyman,logout,arrow_back,add,close,upload_file,expand_more" rel="stylesheet" />
    <meta name="description" content="A free AI router">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/prompts.css">
</head>
<body>
        <div class="full-wh">
        <div class="bg-animation">
            <div id='stars'></div>
            <div id='stars2'></div>
            <div id='stars3'></div>
            <div id='stars4'></div>
        </div>
    </div>
        <div class="avatar-wrapper">
        <span class="material-symbols-outlined avatar-icon" id="avatar-btn">account_circle</span>
        <div class="avatar-dropdown" id="avatar-dropdown">
            <div class="avatar-dropdown-item" id="admin-btn" style="display:none" onclick="window.location='./admin'">
                <span class="material-symbols-outlined">handyman</span>
                Admin Tools
            </div>
            <div class="avatar-dropdown-item" id="signout-btn">
                <span class="material-symbols-outlined">logout</span>
                Sign out
            </div>
        </div>
    </div>

    <h3 class="logo">sayuki <span class="router">proxy</span></h3>
    <button class="back-btn" onclick="window.location='./dashboard'">
        <span class="material-symbols-outlined">arrow_back</span>
        back
    </button>

        
    <div class="dashboard">
        <div style="display: flex; align-items: center; gap: 8px;">
        <input type="text" placeholder="search for lorebooks" id="lorebook-search" oninput="filterLorebooks(this.value)">
        <button style="height: 40px; width: 40px;" onclick="openCreateLorebookModal()">
            <span class="material-symbols-outlined">
                add
            </span>
        </button>
        </div>
        <div class="prompts">

        </div>

    </div>

    <div id="create-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h4>Import Lorebook</h4>
                <span class="material-symbols-outlined" onclick="closeCreateModal()">close</span>
            </div>
            <input id="lorebook-name" placeholder="Lorebook Name" maxlength="100">
            <textarea id="lorebook-description" placeholder="Lorebook Description" maxlength="1000"></textarea>
            <input type="file" id="lorebook-file-input" accept=".json" style="display:none;" onchange="updateFileLabel(this)">
            <div class="file-drop-zone" id="file-drop-zone" onclick="document.getElementById('lorebook-file-input').click()">
                <span class="material-symbols-outlined">upload_file</span>
                <span id="file-label">click to choose a .json file</span>
            </div>
            <select id="api-key-select" data-dropdown style="display:none;">
                <option value="">Select an API Key</option>
            </select>
            <button class="modal-import-btn" onclick="importLorebook()">Import</button>
        </div>
    </div>

    <div id="use-lorebook-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h4>Apply Lorebook</h4>
                <span class="material-symbols-outlined" onclick="closeUseLorebookModal()">close</span>
            </div>
            <p id="use-lorebook-modal-name" class="modal-label"></p>
            <select id="use-lorebook-api-key-select" data-dropdown>
                <option value="">Select an API Key</option>
            </select>
            <button class="modal-import-btn" onclick="applyLorebookToKey()">Apply</button>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
    <script src="scripts/global.js"></script>    <script src="scripts/lorebooks.js"></script>
</body>
</html>
