<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sayuki - master keys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block&icons=account_circle,handyman,logout,arrow_back,add,close,person,refresh,person_remove" rel="stylesheet" />
    <meta name="description" content="A free AI router">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/masterkeys.css">
</head>
<body>
        <div class="full-wh">
        <div class="bg-animation">
            <div id='stars'></div>
            <div id='stars2'></div>
            <div id='stars3'></div>
            <div id='stars4'></div>
        </div>
    </div>
    <div class="avatar-wrapper">
        <span class="material-symbols-outlined avatar-icon" id="avatar-btn">account_circle</span>
        <div class="avatar-dropdown" id="avatar-dropdown">
            <div class="avatar-dropdown-item" id="admin-btn" style="display:none" onclick="window.location='./admin'">
                <span class="material-symbols-outlined">handyman</span>
                Admin Tools
            </div>
            <div class="avatar-dropdown-item" id="signout-btn">
                <span class="material-symbols-outlined">logout</span>
                Sign out
            </div>
        </div>
    </div>
    <h3 class="logo" onclick="window.location='/'">sayuki <span class="router">proxy</span></h3>
    <button class="back-btn" onclick="window.location='./dashboard'">
        <span class="material-symbols-outlined">arrow_back</span>
        back
    </button>

    <div class="dashboard">
        <div style="display: flex; align-items: center; gap: 8px;">
            <input type="text" placeholder="search master keys" id="mk-search" oninput="filterKeys(this.value)">
            <button style="height: 40px; width: 40px;" onclick="openCreateModal()">
                <span class="material-symbols-outlined">add</span>
            </button>
        </div>
        <div class="keys"></div>
    </div>

    <div id="mk-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h4 id="modal-title">Create Provider</h4>
                <span class="material-symbols-outlined" onclick="closeModal()">close</span>
            </div>

            <div class="modal-body">
                <div class="field-row">
                    <label class="modal-label">Name</label>
                    <input id="mk-name" placeholder="e.g. api-main">
                </div>
                <div class="field-row">
                    <label class="modal-label">Upstream API Key</label>
                    <input id="mk-key" placeholder="sk-...">
                </div>
                <div class="field-row">
                    <label class="modal-label">Upstream URL</label>
                    <input id="mk-url" placeholder="https://api.anything.com/v1/chat/completions">
                </div>
                <div class="field-row">
                    <label class="modal-label">Daily Request Limit (0 = unlimited)</label>
                    <input id="mk-limit" type="number" min="0" placeholder="0">
                </div>
                <div class="field-row">
                    <label class="modal-label">Limit Mode</label>
                    <select id="mk-pool-mode">
                        <option value="0">Per User: each user has their own daily limit</option>
                        <option value="1">Shared Pool: all users draw from one shared daily limit</option>
                    </select>
                </div>
                <div class="field-row">
                    <label class="modal-label">Allowed Models (blank = all)</label>
                    <div id="mk-models-list"></div>
                    <button type="button" onclick="addModelRow()" style="margin-top:6px;font-size:12px;height:32px;">
                        <span class="material-symbols-outlined" style="font-size:15px;">add</span>
                        Add model
                    </button>
                </div>
                <div id="mk-users-section" style="display:none;">
                    <hr style="border:none;border-top:1px solid rgba(254,181,191,0.2);margin:6px 0;">
                    <label class="modal-label" style="margin-bottom:4px;">Excluded Users</label>
                    <input id="mk-user-search" placeholder="search users" oninput="filterUsersList(this.value)" style="height:32px;font-size:12px;border-radius:8px;padding:4px 10px;margin-top:0;text-align:left;">
                    <div id="mk-users-list"></div>
                </div>
                <div id="mk-access-section" style="display:none;">
                    <hr style="border:none;border-top:1px solid rgba(254,181,191,0.2);margin:6px 0;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                        <label class="modal-label" style="margin-bottom:0;">Users with Access</label>
                        <button id="mk-refresh-code-btn" type="button" style="font-size:11px;height:28px;padding:0 10px;" onclick="refreshAccessCode()">
                            <span class="material-symbols-outlined" style="font-size:14px;">refresh</span>
                            Refresh Code
                        </button>
                    </div>
                    <input id="mk-access-search" placeholder="search users" oninput="filterAccessList(this.value)" style="height:32px;font-size:12px;border-radius:8px;padding:4px 10px;margin-top:0;text-align:left;">
                    <div id="mk-access-list"></div>
                </div>
            </div>
            <button class="modal-import-btn" id="modal-submit-btn" onclick="submitModal()">Create</button>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
    <script src="scripts/global.js"></script>    <script src="scripts/masterkeys.js"></script>
</body>
</html>
