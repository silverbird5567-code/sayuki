<!DOCTYPE html>
<html lang="en">
<style>
    @import url(https://fonts.googleapis.com/css?family=Inter:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic);

    body {
        margin: 0;
        color: #feb5bf;
        font-family: "Inter";
        user-select: none;
        max-width: 700px;
        margin: 0 auto;

    }

    body::-webkit-scrollbar {
  display: none;
}


    span {
        color: #feb5bf;
    }

    .logo {
        position: fixed;
        left: 15px;
        top: 12px;
        letter-spacing: 1px;
        color: #feb5bf;
        margin: 0;
    }

    .router {
        background-color: #feb5bf;
        color: hsl(180, 7%, 3%);
        padding: 1px 4px;
        border-radius: 5px;
    }

    .avatar-wrapper {
        position: fixed;
        right: 15px;
        top: 10px;
        z-index: 100;
    }

    .avatar-icon {
        font-size: 38px;
        color: #feb5bf;
        cursor: pointer;
        display: block;
        line-height: 1;
        user-select: none;
    }

    .avatar-dropdown {
        display: none;
        position: absolute;
        right: 0;
        top: calc(100% + 6px);
        background: transparent;
        backdrop-filter: blur(15px);
        border: 1px solid #feb5bf;
        border-radius: 8px;
        min-width: 140px;
        overflow: hidden;
    }

    .avatar-dropdown.open {
        display: block;
    }

    .avatar-dropdown-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px;
        color: #e0e0e0;
        transition: background 0.15s;
    }

    .avatar-dropdown-item:hover {
        background: #2a2a2a;
    }

    .avatar-dropdown-item .material-symbols-outlined {
        font-size: 18px;
        color: #feb5bf;
    }

    .name {
        color: #feb5bf;
    }

    .dashboard {
        position: fixed;
        top: 50%;
        left: 50%;
        align-items: center;
        justify-content: center;
        display: flex;
        flex-direction: column;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 25px;
        width: clamp(280px, 50vw, 480px);
    }

    .button {
        border-style: solid;
        border-width: 2px;
        border-color: #feb5bf;
        padding: 10px 18px;
        border-radius: 190px;
        cursor: pointer;
        margin: 5px 0;
        display: flex;
        gap: 8px;
        align-items: center;
        color: #feb5bf;
        font-size: 15px;
        text-align: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        transition: all 0.2s ease-in-out;
        backdrop-filter: blur(5px);
    }

    .button:hover {
        transition: all 0.2s ease-in-out;
        background-color: rgb(254, 181, 191, 0.7);
        /*color: hsl(180, 7%, 3%);*/
    }

    .button:active {
        transform: scale(0.96);
        background-color: rgb(254, 181, 191, 0.85);
    }

    .circle {
        border-radius: 50%;
        width: 38px;
        height: 38px;
        cursor: pointer;
        border-color: #feb5bf;
        border-style: solid;
        border-width: 2px;
        align-items: center;
        justify-content: center;
        display: flex;
        color: #feb5bf;
        font-size: 15px;
        transition: all 0.2s ease-in-out;
    }

    .circle:hover {
        transition: all 0.2s ease-in-out;
        background-color: #feb5bf;
    }

    .circle:hover span {
        color: hsl(180, 7%, 3%);
    }

    .circle:active {
        transform: scale(0.92);
        background-color: #feb5bf;
    }

    .circle:active span {
        color: hsl(180, 7%, 3%);
    }

    input {
        border-style: solid;
        border-width: 2px;
        border-color: #feb5bf;
        padding: 10px 18px;
        border-radius: 190px;
        cursor: pointer;
        display: flex;
        gap: 8px;
        align-items: center;
        color: #feb5bf;
        font-size: 15px;
        text-align: center;
        margin-top: 15px;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        backdrop-filter: blur(5px);
        transition: all 0.2s ease-in-out;
        background-color: transparent;
    }

    input:focus {
        transition: all 0.2s ease-in-out;
        background-color: rgb(254, 181, 191, 0.7);
        outline: none;
        color: white;
    }

    input:focus::placeholder {
        color: white;
    }

    input::placeholder {
        color: #feb5bf;
    }

    .back-btn {
        position: fixed;
        top: 50px;
        left: 15px;
        height: 32px;
        width: auto;
        padding: 0 14px;
        border-radius: 190px;
        background-color: transparent;
        border: 2px solid #feb5bf;
        cursor: pointer;
        display: flex;
        align-items: center;
        color: #feb5bf;
        font-size: 13px;
        gap: 4px;
        z-index: 100;
    }

    .back-btn .material-symbols-outlined {
        font-size: 16px;
    }


    textarea {
        width: 100%;
        height: 100px;
        resize: none;
        border-style: solid;
        border-width: 2px;
        border-color: #feb5bf;
        padding: 10px 18px;
        border-radius: 19px;
        cursor: pointer;
        display: flex;
        gap: 8px;
        align-items: center;
        color: #feb5bf;
        font-size: 15px;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        backdrop-filter: blur(5px);
        transition: all 0.2s ease-in-out;
        background-color: transparent;
    }

    textarea:focus {
        transition: all 0.2s ease-in-out;
        background-color: rgb(254, 181, 191, 0.7);
        outline: none;
        color: white;
    }

    textarea:focus::placeholder {
        color: white;
    }

    textarea::placeholder {
        color: #feb5bf;
    }

    textarea {
        margin-left: 5px;
        margin-top: 15px;
        width: 100%;
        height: 100%;
        min-height: 150px;
    }

    textarea::-webkit-scrollbar {
        display: none;
    }

    .chat {
        width: 95%;
        height: min-content;
        border: 2px solid #feb5bf;
        border-radius: 15px;
        padding: 5px;
        cursor: pointer;
    }

    .chats {
        border: 2px solid #feb5bf;
        height: 200px;
        border-radius: 15px;
        margin-top: 15px;
        padding: 10px 5px;
        display: flex;
        align-items: center;
        flex-direction: column;
    }

    .clicktoopen {
        position: absolute;
        right: 25px;
        margin-top: -3px;
    }
</style>
<link href="../../styles/global.css" type="stylesheet">
<link href="../../styles/index.css" type="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block&icons=chevron_forward" rel="stylesheet" />

<body>
    <div style="display: flex; height: 100%;">
        <div>
            <input id="apiUrl" placeholder="moderation api url (openai)" style="width: 240px;">
            <input id="apiKey" placeholder="moderation api key" style="width: 240px;">
            <input id="moderationModel" placeholder="moderation model" style="width: 240px;">
        </div>
        <textarea id="moderationPrompt" placeholder="moderation prompt"></textarea>
    </div>

    <input id="discordWebhook" placeholder="discord webhook url">
    <div class="button" id="saveBtn" style="width: 50%; margin-left: calc(50% - 25%); margin-top: 15px;">Save</div>
    <hr style="border-color: #feb5bf;">
    <input id="search" placeholder="search for flagged chats (username)">
    <div class="chats" id="chats">
        <span id="empty">No flagged chats</span>
    </div>

    <script src="../../scripts/auth.js"></script>
    <script>auth.requireAdmin();</script>
    <script src="./scripts/moderation.js"></script>
</body>

</html>
