<!DOCTYPE html>
<html lang="en">
<style>
    @import url(https://fonts.googleapis.com/css?family=Inter:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic);

    body {
        margin: 0;
        color: #feb5bf;
        font-family: "Inter";
        user-select: none;
        max-width: 700px;
        margin: 0 auto;

    }

    body::-webkit-scrollbar {
        display: none;
    }

    span {
        color: #feb5bf;
    }

    .logo {
        position: fixed;
        left: 15px;
        top: 12px;
        letter-spacing: 1px;
        color: #feb5bf;
        margin: 0;
    }

    .router {
        background-color: #feb5bf;
        color: hsl(180, 7%, 3%);
        padding: 1px 4px;
        border-radius: 5px;
    }

    .avatar-wrapper {
        position: fixed;
        right: 15px;
        top: 10px;
        z-index: 100;
    }

    .avatar-icon {
        font-size: 38px;
        color: #feb5bf;
        cursor: pointer;
        display: block;
        line-height: 1;
        user-select: none;
    }

    .avatar-dropdown {
        display: none;
        position: absolute;
        right: 0;
        top: calc(100% + 6px);
        background: transparent;
        backdrop-filter: blur(15px);
        border: 1px solid #feb5bf;
        border-radius: 8px;
        min-width: 140px;
        overflow: hidden;
    }

    .avatar-dropdown.open {
        display: block;
    }

    .avatar-dropdown-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px;
        color: #e0e0e0;
        transition: background 0.15s;
    }

    .avatar-dropdown-item:hover {
        background: #2a2a2a;
    }

    .avatar-dropdown-item .material-symbols-outlined {
        font-size: 18px;
        color: #feb5bf;
    }

    .name {
        color: #feb5bf;
    }

    .dashboard {
        position: fixed;
        top: 50%;
        left: 50%;
        align-items: center;
        justify-content: center;
        display: flex;
        flex-direction: column;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 25px;
        width: clamp(280px, 50vw, 480px);
    }

    .button {
        border-style: solid;
        border-width: 2px;
        border-color: #feb5bf;
        padding: 10px 18px;
        border-radius: 190px;
        cursor: pointer;
        margin: 5px 0;
        display: flex;
        gap: 8px;
        align-items: center;
        color: #feb5bf;
        font-size: 15px;
        text-align: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        transition: all 0.2s ease-in-out;
        backdrop-filter: blur(5px);
    }

    .button:hover {
        transition: all 0.2s ease-in-out;
        background-color: rgb(254, 181, 191, 0.7);
    }

    .circle {
        border-radius: 50%;
        width: 38px;
        height: 38px;
        cursor: pointer;
        border-color: #feb5bf;
        border-style: solid;
        border-width: 2px;
        align-items: center;
        justify-content: center;
        display: flex;
        color: #feb5bf;
        font-size: 15px;
        transition: all 0.2s ease-in-out;
    }

    .circle:hover {
        transition: all 0.2s ease-in-out;
        background-color: #feb5bf;
    }

    .circle:hover span {
        color: hsl(180, 7%, 3%);
    }

    input {
        border-style: solid;
        border-width: 2px;
        border-color: #feb5bf;
        padding: 10px 18px;
        border-radius: 190px;
        cursor: pointer;
        display: flex;
        gap: 8px;
        align-items: center;
        color: #feb5bf;
        font-size: 15px;
        text-align: center;
        margin-top: 15px;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        backdrop-filter: blur(5px);
        transition: all 0.2s ease-in-out;
        background-color: transparent;
    }

    input:focus {
        transition: all 0.2s ease-in-out;
        background-color: rgb(254, 181, 191, 0.7);
        outline: none;
        color: white;
    }

    input:focus::placeholder {
        color: white;
    }

    input::placeholder {
        color: #feb5bf;
    }

    .back-btn {
        position: fixed;
        top: 50px;
        left: 15px;
        height: 32px;
        width: auto;
        padding: 0 14px;
        border-radius: 190px;
        background-color: transparent;
        border: 2px solid #feb5bf;
        cursor: pointer;
        display: flex;
        align-items: center;
        color: #feb5bf;
        font-size: 13px;
        gap: 4px;
        z-index: 100;
    }

    .back-btn .material-symbols-outlined {
        font-size: 16px;
    }

    .chat {
        width: 95%;
        height: min-content;
        border: 2px solid #feb5bf;
        border-radius: 15px;
        padding: 5px;
        cursor: pointer;
    }

    .chats {
        border: 2px solid #feb5bf;
        height: 100%;
        border-radius: 15px;
        margin-top: 15px;
        padding: 10px 5px;
        display: flex;
        align-items: center;
        flex-direction: column;
    }

    .chat {
        position: relative;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        margin-bottom: 4px;
    }

    .log-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid #feb5bf;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #feb5bf;
    }

    .user-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
        min-width: 0;
    }

    .user-name {
        font-size: 14px;
        color: #feb5bf;
        font-weight: 600;
    }

    .log-content {
        font-size: 13px;
        color: #feb5bf;
        opacity: 0.9;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .user-meta {
        font-size: 11px;
        color: #feb5bf;
        opacity: 0.6;
        display: flex;
        gap: 8px;
    }
</style>
<link href="../../styles/global.css" type="stylesheet">
<link href="../../styles/index.css" type="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block&icons=receipt_long" rel="stylesheet" />

<body>
    <input id="search" placeholder="filter by actor">
    <div class="chats" id="logs">
        <span id="empty">No audit logs</span>
    </div>

    <script src="../../scripts/auth.js"></script>
    <script>
        function search(query) {
            let hit = false
            document.querySelectorAll(".chat").forEach((card) => {
                if (!(card.id).includes(query)) {
                    card.style.display = "none"
                } else {
                    hit = true
                    card.style.display = ""
                }
            })

            if (!hit) {
                document.getElementById("empty").style.display = ""
            } else {
                document.getElementById("empty").style.display = "none"
            }
        }

        function createLog(entry) {
            document.getElementById("empty").style.display = "none"
            let card = document.createElement("div")
            card.id = entry.actor
            card.className = "chat"

            const ts = new Date(entry.created_at * 1000)
            const date = ts.toLocaleDateString()
            const time = ts.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })

            card.innerHTML = `
                <div class="log-icon">
                    <span class="material-symbols-outlined" style="font-size:18px;">receipt_long</span>
                </div>
                <div class="user-info">
                    <span class="user-name">${entry.actor}</span>
                    <span class="log-content">${entry.content}</span>
                    <span class="user-meta">
                        <span>${date} ${time}</span>
                        ${entry.ip ? `<span>${entry.ip}</span>` : ""}
                    </span>
                </div>
            `
            document.getElementById("logs").appendChild(card)
        }

        document.getElementById("search").addEventListener("input", function (e) {
            search(e.target.value)
        })

        async function loadLogs() {
            const res = await fetch("/api/logs/audit", {
                headers: {
                    "Authorization": "Bearer " + localStorage.getItem("token")
                }
            })
            if (!res.ok) return
            const logs = await res.json()
            logs.forEach(createLog)
        }

        loadLogs()

        auth.requireAdmin();
    </script>
</body>

</html>
