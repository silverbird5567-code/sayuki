<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sayuki - administration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block&icons=account_circle,home,logout,arrow_back,shield,people,receipt" rel="stylesheet" />
    <meta name="description" content="A free AI router">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
        <div class="full-wh">
        <div class="bg-animation">
            <div id='stars'></div>
            <div id='stars2'></div>
            <div id='stars3'></div>
            <div id='stars4'></div>
        </div>
    </div>
        <div class="avatar-wrapper">
        <span class="material-symbols-outlined avatar-icon" id="avatar-btn">account_circle</span>
        <div class="avatar-dropdown" id="avatar-dropdown">
            <div class="avatar-dropdown-item" id="admin-btn" style="display:none" onclick="window.location='./'">
                <span class="material-symbols-outlined">home</span>
                Home
            </div>
            <div class="avatar-dropdown-item" id="signout-btn">
                <span class="material-symbols-outlined">logout</span>
                Sign out
            </div>
        </div>
    </div>

    <h3 class="logo">sayuki <span class="router">proxy</span></h3>
    <button class="back-btn" onclick="window.location='./dashboard'">
        <span class="material-symbols-outlined">arrow_back</span>
        back
    </button>

    <div class="dashboard">
        <div class="tabs">

            <div id="moderation" class="tab active" onclick="changeTab('moderation')">
                <span class="material-symbols-outlined">shield</span>
                moderation
            </div>

            <div id="users" class="tab" onclick="changeTab('users')">
                <span class="material-symbols-outlined">people</span>
                users
            </div>

            <div id="audit" class="tab" onclick="changeTab('audit')">
                <span class="material-symbols-outlined">receipt</span>
                audit
            </div>
        </div>
    </div>
        <iframe id="tab-content" src="./service/admin/moderation.html"></iframe>


    <script src="scripts/auth.js"></script>
    <script src="scripts/global.js"></script>
    <script src="scripts/admin.js"></script>
</body>
</html>
