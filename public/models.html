<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sayuki - models</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block&icons=account_circle,handyman,logout,arrow_back" rel="stylesheet" />
    <meta name="description" content="A free AI router">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/models.css">
</head>
<body>
        <div class="full-wh">
        <div class="bg-animation">
            <div id='stars'></div>
            <div id='stars2'></div>
            <div id='stars3'></div>
            <div id='stars4'></div>
        </div>
    </div>
        <div class="avatar-wrapper">
        <span class="material-symbols-outlined avatar-icon" id="avatar-btn">account_circle</span>
        <div class="avatar-dropdown" id="avatar-dropdown">
            <div class="avatar-dropdown-item" id="admin-btn" style="display:none" onclick="window.location='./admin'">
                <span class="material-symbols-outlined">handyman</span>
                Admin Tools
            </div>
            <div class="avatar-dropdown-item" id="signout-btn">
                <span class="material-symbols-outlined">logout</span>
                Sign out
            </div>
        </div>
    </div>
    <h3 class="logo" onclick="window.location='/'">sayuki <span class="router" onclick="window.location='/'">proxy</span></h3>
    <button class="back-btn" onclick="window.location='./dashboard'">
        <span class="material-symbols-outlined">arrow_back</span>
        back
    </button>

        
    <div class="dashboard" style="margin-top: 15px;">

        <input type="text" placeholder="search model names">
        <input type="range" min="1" max="1000000" value="1" id="contextWindow" class="slider">
        <div id="sliderLabel" style="font-size:small; color:rgba(254,181,191,0.65); margin-bottom:4px;">Min context: any</div>
        
        <div class="models">
        </div>

    </div>

    <script src="scripts/auth.js"></script>
    <script src="scripts/global.js"></script>    <script src="scripts/models.js"></script>

</body>
</html>
